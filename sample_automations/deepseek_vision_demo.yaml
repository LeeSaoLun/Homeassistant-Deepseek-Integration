# Vision demo — uses the integration's own brand icon (no extra file to copy).
# Requires: Allow vision enabled. If the service reports a blocked path, add to
# configuration.yaml: allowlist_external_dirs: [/config/custom_components/deepseek_conversation]
# Trigger: Developer tools → Events → deepseek_vision_demo

alias: DeepSeek Vision Demo
description: generate_content with filenames — uses bundled DeepSeek brand icon.png
mode: single

triggers:
  - trigger: event
    event_type: deepseek_vision_demo

conditions:
  - condition: template
    value_template: >-
      {% set ns = namespace(ok=false) %}
      {% for e in integration_entities('deepseek_conversation') %}
        {% if e.startswith('conversation.') %}{% set ns.ok = true %}{% endif %}
      {% endfor %}
      {{ ns.ok }}

actions:
  - variables:
      deepseek_config_entry: >-
        {% for e in integration_entities('deepseek_conversation') %}
        {%- if e.startswith('conversation.') %}{{ config_entry_id(e) }}{% break %}{% endif %}
        {% endfor %}
      image_path: /config/custom_components/deepseek_conversation/brand/icon.png

  - action: deepseek_conversation.generate_content
    data:
      config_entry: "{{ deepseek_config_entry }}"
      prompt: >-
        This image ships with the DeepSeek Conversation integration (brand icon).
        Describe what you see in two short sentences. Reply in English.
      filenames:
        - "{{ image_path }}"
      chat_model: deepseek-v4-flash
      thinking_enabled: false
      max_tokens: 200
    response_variable: deepseek_vision

  - action: persistent_notification.create
    data:
      title: DeepSeek Vision Demo
      message: >-
        Image: {{ image_path }}

        {{ deepseek_vision.text }}

        usage: {{ deepseek_vision.usage }}
        (prompt_tokens well above ~100 usually means the image was sent)
      notification_id: deepseek_vision_demo
